name: PR Lead Time Tracking

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write   

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run script
        run: |
          pip install requests
          python lead_time.py

      - name: Commit README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "update: PR lead time in README" || echo "No changes"
          git push
