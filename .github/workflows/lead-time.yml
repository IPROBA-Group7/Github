name: PR Lead Time Tracking

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run lead time script
        run: |
          python lead_time.py

      - name: Run cycle time (pro)
        env:
          TOKEN_CUSTOM: ${{ secrets.GITHUB_TOKEN_CUSTOM }}
        run: |
          python cycle_time_pro.py

      - name: Commit README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "update: metrics in README" || echo "No changes"
          git push
